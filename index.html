<script>
        let currentConfig = "";
        const mainPage = document.getElementById('mainPage');
        const resultArea = document.getElementById('resultArea');
        const genBtn = document.getElementById('genBtn');
        const errorMsg = document.getElementById('errorMsg');
        const qrcodeDiv = document.getElementById('qrcode');
        const displayCount = document.getElementById('displayCount');

        genBtn.onclick = async () => {
            genBtn.disabled = true;
            genBtn.innerText = "Registering...";
            errorMsg.classList.add('hidden');
            
            try {
                const res = await fetch('/api/generate');
                if (!res.ok) throw new Error();
                
                const data = await res.json();
                currentConfig = data.config;
                
                // Server မှရသော Global Count ကို သုံးခြင်း
                const serverCount = data.count;
                displayCount.innerText = serverCount;

                qrcodeDiv.innerHTML = "";
                new QRCode(qrcodeDiv, { 
                    text: currentConfig, width: 240, height: 240, 
                    colorDark: "#000000", correctLevel: QRCode.CorrectLevel.H 
                });

                mainPage.classList.add('hidden');
                resultArea.classList.remove('hidden');
                resultArea.style.display = 'flex';
            } catch (e) {
                errorMsg.classList.remove('hidden');
            } finally {
                genBtn.disabled = false;
                genBtn.innerText = "Generate New Config";
            }
        };

        document.getElementById('backBtn').onclick = () => {
            resultArea.style.display = 'none';
            mainPage.classList.remove('hidden');
        };

        document.getElementById('dlBtn').onclick = () => {
            if(!currentConfig) return;
            const blob = new Blob([currentConfig], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            // ဖိုင်အမည်ကို လက်ရှိ Global Count နံပါတ်ဖြင့် ပေးသည်
            const countNum = displayCount.innerText;
            a.download = `Phoenix_${countNum}.conf`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
        };
    </script>
